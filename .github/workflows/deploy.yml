name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build & Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (static export)
        run: npm run build
        env:
          # Empty Clerk keys prevent server-action static analysis issues.
          # Auth is client-side (localStorage) on GitHub Pages.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ""
          CLERK_SECRET_KEY: ""
          DATABASE_URL: "postgresql://placeholder"
          STRIPE_SECRET_KEY: "sk_test_placeholder"
          STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
          STRIPE_PRICE_ID: "price_placeholder"
          NEXT_PUBLIC_APP_URL: "https://burninmedia.github.io/greybox-mvp"

      - name: Add CNAME for custom domain
        run: |
          if [ -f CNAME ]; then cp CNAME out/CNAME; fi
          echo "greybox.fyi" > out/CNAME

      - name: Verify output
        run: find out/ -type f -name "*.html" | sort

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
